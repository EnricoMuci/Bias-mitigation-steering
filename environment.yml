name: thesis-env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  - pandas
  - numpy
  - matplotlib
  - scikit-learn
  - pip:
    - datasets
    - dialz
    - python-dotenv
    - transformers
    - bitsandbytes
    - accelerate